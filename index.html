<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBCRM — Real Estate CRM</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">NBCRM</div>
        <nav id="nav"></nav>
        <button id="seedDataBtn" class="ghost-btn">Seed Demo Data</button>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Your premium real-estate operating cockpit.</p>
          </div>
          <div class="quick-actions" id="quickActions"></div>
        </header>
        <section id="content"></section>
      </main>
    </div>

    <dialog id="drawer" class="drawer">
      <form method="dialog" class="drawer-card" id="drawerForm"></form>
    </dialog>

    <template id="cardTemplate">
      <article class="card"></article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
